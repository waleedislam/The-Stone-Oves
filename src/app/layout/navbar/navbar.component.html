<nav class="navbar" [class.scrolled]="isScrolled()">
  <div class="container navbar__inner">

    <a routerLink="/" class="navbar__logo" (click)="closeMenu()">
      <div class="logo-icon">
        <span class="logo-flame">🔥</span>
      </div>
      <div class="logo-text">
        <span class="logo-main">The Stone Oves</span>
        <span class="logo-sub">Wood Fired Kitchen</span>
      </div>
    </a>

    <ul class="navbar__links">
      <li>
        <a routerLink="/" routerLinkActive="active"
          [routerLinkActiveOptions]="{exact:true}" class="nav-link">Home</a>
      </li>
      <li>
        <a routerLink="/menu" routerLinkActive="active" class="nav-link">Menu</a>
      </li>
      <li>
        <a routerLink="/deals" routerLinkActive="active" class="nav-link">Deals</a>
      </li>
      <li>
        <a routerLink="/about" routerLinkActive="active" class="nav-link">About</a>
      </li>
    </ul>

    <div class="navbar__actions">

      <button class="cart-btn" (click)="cart.toggleCart()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="9" cy="21" r="1"/>
          <circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="cart-badge" *ngIf="cart.itemCount() > 0">
          {{ cart.itemCount() }}
        </span>
      </button>

      <a routerLink="/menu" class="btn-primary navbar__order-btn">
        Order Now
      </a>

      <button class="hamburger" (click)="toggleMenu()"
        [class.open]="menuOpen()">
        <span></span>
        <span></span>
        <span></span>
      </button>

    </div>
  </div>

  <div class="mobile-menu" [class.open]="menuOpen()">
    <ul>
      <li>
        <a routerLink="/" routerLinkActive="active"
          [routerLinkActiveOptions]="{exact:true}"
          (click)="closeMenu()">Home</a>
      </li>
      <li>
        <a routerLink="/menu" routerLinkActive="active"
          (click)="closeMenu()">Menu</a>
      </li>
      <li>
        <a routerLink="/deals" routerLinkActive="active"
          (click)="closeMenu()">Deals</a>
      </li>
      <li>
        <a routerLink="/about" routerLinkActive="active"
          (click)="closeMenu()">About</a>
      </li>
      <li>
        <a routerLink="/menu" class="btn-primary mobile-order-btn"
          (click)="closeMenu()">Order Now</a>
      </li>
    </ul>
  </div>
</nav>

<div class="menu-backdrop" *ngIf="menuOpen()" (click)="closeMenu()"></div>
